services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/extensio_ai
      CLIENT_ORIGIN: http://localhost:5173,http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    volumes:
      - backend-storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-storage:
